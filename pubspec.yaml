name: runtime_ci_tooling
description: |
  Shared CI/CD automation tooling for open-runtime or pieces-app packages. Provides a reusable
  triage pipeline, Gemini CLI integration, audit trail management, release
  automation, and GitHub Actions workflow utilities that any package can depend on.
version: 0.16.0
publish_to: none
executables:
  manage_cicd: manage_cicd
  triage_cli: triage_cli

environment:
  sdk: ^3.9.0

# NOTE: `resolution: workspace` is intentionally absent in this repo so this package
# resolves correctly in its own standalone CI pipeline. In your local monorepo
# workspace you may add it, but never commit it back here.

dependencies:
  args: ^2.7.0
  build_cli_annotations: ^2.1.1
  crypto: ^3.0.6
  mustache_template: ^2.0.3
  path: ^1.9.1
  pub_semver: ^2.2.0
  yaml: ^3.1.3
  yaml_edit: ^2.2.2

dev_dependencies:
  build_cli: ^2.2.10
  build_runner: ^2.4.14
  test: ^1.28.0
