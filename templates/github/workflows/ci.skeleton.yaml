{{=<% %>=}}
# Generated by runtime_ci_tooling v<%tooling_version%>
# Configured via .runtime_ci/config.json — run 'dart run runtime_ci_tooling:manage_cicd update --workflows' to regenerate.
# Policy: test artifact retention-days = <%artifact_retention_days%> (applied consistently).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.bot_check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check for bot commit
        id: bot_check
        run: |
          AUTHOR=$(git log -1 --format='%an')
          MSG=$(git log -1 --format='%s')
          echo "Commit author: $AUTHOR"
          echo "Commit subject: $MSG"
          if [[ "$AUTHOR" == "github-actions[bot]" ]] || [[ "$MSG" == *"[skip ci]"* ]] || [[ "$MSG" == "bot(format)"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Bot commit detected — skipping CI."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

<%#format_check%>
  auto-format:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.format-push.outputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.<%pat_secret%> || github.token }}
          persist-credentials: true

      - uses: dart-lang/setup-dart@v1.7.1
        with:
          sdk: "<%dart_sdk%>"

      - name: Format code
        run: dart format --line-length <%line_length%> .

      - name: Commit and push formatting
        id: format-push
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -u -- '*.dart'
            git commit -m "bot(format): apply dart format --line-length <%line_length%> [skip ci]"
            if git push; then
              echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
              echo "::notice::Formatting changes committed and pushed."
            else
              echo "::warning::Could not push formatting changes (branch may be protected or this is a fork PR)."
            fi
          else
            echo "::notice::Code is already formatted."
          fi

<%/format_check%>
<%#single_platform%>
  analyze-and-test:
    needs: [pre-check<%#format_check%>, auto-format<%/format_check%>]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: <%runner%>
<%#has_secrets%>
    env:
<%#secrets_list%>
      <%env_name%>: ${{ secrets.<%secret_name%> }}
<%/secrets_list%>
<%/has_secrets%>
    steps:
<%> shared_setup_through_build %>
<%> shared_analysis_block %>
# --- BEGIN USER: pre-test ---
# --- END USER: pre-test ---

      # ── shared:test ── keep in sync with multi_platform ──
<%#managed_test%>
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "$TEST_LOG_DIR"
          dart run runtime_ci_tooling:manage_cicd test 2>&1 | tee "$TEST_LOG_DIR/console.log"
        env:
          TEST_LOG_DIR: ${{ runner.temp }}/test-logs
          PLATFORM_ID: <%single_platform_id%>

      - name: Upload test logs
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-<%single_platform_id%>
          path: |
            ${{ runner.temp }}/test-logs/
            test/integration/fixtures/bin/
            **/test-results/
          retention-days: <%artifact_retention_days%>
<%/managed_test%>
<%^managed_test%>
      - name: Test
        run: dart test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-<%runner%>
          path: |
            test/integration/fixtures/bin/
            **/test-results/
          retention-days: <%artifact_retention_days%>
<%/managed_test%>

# --- BEGIN USER: post-test ---
# --- END USER: post-test ---
<%/single_platform%>
<%#multi_platform%>
  analyze:
    needs: [pre-check<%#format_check%>, auto-format<%/format_check%>]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
<%#has_secrets%>
    env:
<%#secrets_list%>
      <%env_name%>: ${{ secrets.<%secret_name%> }}
<%/secrets_list%>
<%/has_secrets%>
    steps:
<%> shared_setup_through_build %>
<%> shared_analysis_block %>
  test:
    needs: [pre-check, analyze<%#format_check%>, auto-format<%/format_check%>]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: <%platform_matrix_json%>
<%#has_secrets%>
    env:
<%#secrets_list%>
      <%env_name%>: ${{ secrets.<%secret_name%> }}
<%/secrets_list%>
<%/has_secrets%>
    steps:
<%> shared_setup_through_build %>
# --- BEGIN USER: pre-test ---
# --- END USER: pre-test ---

      # ── shared:test ──
<%#managed_test%>
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "$TEST_LOG_DIR"
          dart run runtime_ci_tooling:manage_cicd test 2>&1 | tee "$TEST_LOG_DIR/console.log"
        env:
          TEST_LOG_DIR: ${{ runner.temp }}/test-logs
          PLATFORM_ID: ${{ matrix.platform_id }}

      - name: Upload test logs
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.platform_id }}
          path: |
            ${{ runner.temp }}/test-logs/
            test/integration/fixtures/bin/
            **/test-results/
          retention-days: <%artifact_retention_days%>
<%/managed_test%>
<%^managed_test%>
      - name: Test
        run: dart test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.platform_id }}
          path: |
            test/integration/fixtures/bin/
            **/test-results/
          retention-days: <%artifact_retention_days%>
<%/managed_test%>

# --- BEGIN USER: post-test ---
# --- END USER: post-test ---
<%/multi_platform%>
<%#web_test%>
  web-test:
    needs: [pre-check<%#format_check%>, auto-format<%/format_check%><%#single_platform%>, analyze-and-test<%/single_platform%><%#multi_platform%>, analyze<%/multi_platform%>]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
<%#has_secrets%>
    env:
<%#secrets_list%>
      <%env_name%>: ${{ secrets.<%secret_name%> }}
<%/secrets_list%>
<%/has_secrets%>
    steps:
<%> shared_setup_through_build %>
<%> shared_proto_verify %>
      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@4f8e94349a351df0f048634f25fec36c3c91eded # v2.1.1
        with:
          install-dependencies: true

      - name: Verify Chrome
        run: ${{ steps.setup-chrome.outputs.chrome-path }} --version

      # Ubuntu 23.10+/24.04 restricts unprivileged user namespaces via AppArmor.
      # Chrome can fail with "No usable sandbox!" on hosted runners without this.
      - name: Enable Chrome user namespaces on Ubuntu
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if [[ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

<%#web_test_has_paths%>
      - name: Web Test
        run: dart test -p chrome --concurrency=<%web_test_concurrency%> -- <%web_test_paths%>
        env:
          CHROME_EXECUTABLE: ${{ steps.setup-chrome.outputs.chrome-path }}
<%/web_test_has_paths%>
<%^web_test_has_paths%>
      - name: Web Test
        run: dart test -p chrome --concurrency=<%web_test_concurrency%>
        env:
          CHROME_EXECUTABLE: ${{ steps.setup-chrome.outputs.chrome-path }}
<%/web_test_has_paths%>

      - name: Upload web test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-artifacts
          path: |
            **/test-results/
            ${{ runner.temp }}/test-results/
          if-no-files-found: ignore
          retention-days: <%artifact_retention_days%>

<%/web_test%>
# --- BEGIN USER: extra-jobs ---
# --- END USER: extra-jobs ---
