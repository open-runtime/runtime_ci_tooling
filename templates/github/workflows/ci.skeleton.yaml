{{=<% %>=}}
# Generated by runtime_ci_tooling v<%tooling_version%>
# Configured via .runtime_ci/config.json — run 'dart run runtime_ci_tooling:manage_cicd update --workflows' to regenerate.
# Policy: test artifact retention-days = <%artifact_retention_days%> (applied consistently).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.bot_check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check for bot commit
        id: bot_check
        run: |
          AUTHOR=$(git log -1 --format='%an')
          MSG=$(git log -1 --format='%s')
          echo "Commit author: $AUTHOR"
          echo "Commit subject: $MSG"
          if [[ "$AUTHOR" == "github-actions[bot]" ]] || [[ "$MSG" == *"[skip ci]"* ]] || [[ "$MSG" == "bot(format)"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Bot commit detected — skipping CI."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

<%#format_check%>
  auto-format:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.format-push.outputs.sha || github.sha }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.<%pat_secret%> || github.token }}
          persist-credentials: true

      - uses: dart-lang/setup-dart@v1.7.1
        with:
          sdk: "<%dart_sdk%>"

      - name: Format code
        run: dart format --line-length <%line_length%> .

      - name: Commit and push formatting
        id: format-push
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -u -- '*.dart'
            git commit -m "bot(format): apply dart format --line-length <%line_length%> [skip ci]"
            if git push; then
              echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
              echo "::notice::Formatting changes committed and pushed."
            else
              echo "::warning::Could not push formatting changes (branch may be protected or this is a fork PR)."
            fi
          else
            echo "::notice::Code is already formatted."
          fi

<%/format_check%>
<%#single_platform%>
  analyze-and-test:
    needs: [pre-check<%#format_check%>, auto-format<%/format_check%>]
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: <%runner%>
<%#has_secrets%>
    env:
<%#secrets_list%>
      <%env_name%>: ${{ secrets.<%secret_name%> }}
<%/secrets_list%>
<%/has_secrets%>
    steps:
      # ── shared:checkout ── keep in sync with multi_platform ──
      - uses: actions/checkout@v6.0.2
        with:
<%#format_check%>
          ref: ${{ needs.auto-format.outputs.sha }}
<%/format_check%>
          fetch-depth: 1
          persist-credentials: false
<%#lfs%>
          lfs: true
<%/lfs%>

      # ── shared:git-config ── keep in sync with multi_platform ──
      - name: Configure Git for HTTPS with Token
        shell: bash
        run: |
          TOKEN="${{ secrets.<%pat_secret%> || secrets.GITHUB_TOKEN }}"
          echo "::add-mask::${TOKEN}"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${TOKEN}@github.com/open-runtime/".insteadOf "git@github.com:open-runtime/"
          git config --global url."https://x-access-token:${TOKEN}@github.com/pieces-app/".insteadOf "git@github.com:pieces-app/"

      # ── shared:dart-setup ── keep in sync with multi_platform ──
      - uses: dart-lang/setup-dart@v1.7.1
        with:
          sdk: "<%dart_sdk%>"

      # ── shared:pub-cache ── keep in sync with multi_platform ──
      # Windows: %LOCALAPPDATA%\Pub\Cache (Dart default). Unix: ~/.pub-cache
      - name: Cache Dart pub dependencies
        uses: actions/cache@v5.0.3
        with:
          path: ${{ runner.os == 'Windows' && format('{0}\\Pub\\Cache', env.LOCALAPPDATA) || '~/.pub-cache' }}
          key: ${{ runner.os }}-${{ runner.arch }}-dart-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-dart-pub-

      # ── shared:proto-setup ── keep in sync with multi_platform ──
<%#proto%>
      - name: Install protoc
        uses: arduino/setup-protoc@v3.0.0

      - run: dart pub global activate protoc_plugin 25.0.0

<%/proto%>
      # ── shared:pub-get ── keep in sync with multi_platform ──
      - run: dart pub get
        env:
          GIT_LFS_SKIP_SMUDGE: "1"

<%#build_runner%>
      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

<%/build_runner%>
      # ── shared:analysis-cache ── keep in sync with multi_platform ──
<%#analysis_cache%>
      - name: Cache Dart analysis
        uses: actions/cache@v5.0.3
        with:
          path: ~/.dartServer
          key: ${{ runner.os }}-${{ runner.arch }}-dart-analysis-${{ hashFiles('**/*.dart', '**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-dart-analysis-

<%/analysis_cache%>
      # ── shared:proto-verify ── keep in sync with multi_platform ──
<%#proto%>
      - name: Verify proto files
        run: dart run runtime_ci_tooling:manage_cicd verify-protos

<%/proto%>
      # ── shared:analyze ── keep in sync with multi_platform ──
<%#managed_analyze%>
      - name: Analyze
        run: dart run runtime_ci_tooling:manage_cicd analyze
<%/managed_analyze%>
<%^managed_analyze%>
      - name: Analyze
        run: |
          dart analyze 2>&1 | tee "$RUNNER_TEMP/analysis.txt"
          if grep -q "^  error -" "$RUNNER_TEMP/analysis.txt"; then
            echo "::error::Analysis errors found"
            exit 1
          fi
<%/managed_analyze%>

      # ── shared:sub-packages ── keep in sync with multi_platform ──
<%#sub_packages%>
      - name: Analyze (<%name%>)
        working-directory: <%path%>
        run: |
          GIT_LFS_SKIP_SMUDGE=1 dart pub get
          dart analyze 2>&1 | tee "$RUNNER_TEMP/sub_analysis.txt"
          if grep -q "^  error -" "$RUNNER_TEMP/sub_analysis.txt"; then
            echo "::error::Errors found in <%name%>"
            exit 1
          fi

<%/sub_packages%>
# --- BEGIN USER: pre-test ---
# --- END USER: pre-test ---

      # ── shared:test ── keep in sync with multi_platform ──
<%#managed_test%>
      - name: Test
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "$TEST_LOG_DIR"
          dart run runtime_ci_tooling:manage_cicd test 2>&1 | tee "$TEST_LOG_DIR/console.log"
        env:
          TEST_LOG_DIR: ${{ runner.temp }}/test-logs
          PLATFORM_ID: <%single_platform_id%>

      - name: Upload test logs
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-<%single_platform_id%>
          path: |
            ${{ runner.temp }}/test-logs/
            test/integration/fixtures/bin/
            **/test-results/
          retention-days: <%artifact_retention_days%>
<%/managed_test%>
<%^managed_test%>
      - name: Test
        run: dart test

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-<%runner%>
          path: |
            test/integration/fixtures/bin/
            **/test-results/
          retention-days: <%artifact_retention_days%>
<%/managed_test%>

